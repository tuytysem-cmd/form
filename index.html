<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        div{
            display: flex;
            justify-content: center;
            
        }
        body{
            font-family: khmer os battambang;
            font-size: 12px;
        }
        input,button{
            font-family: khmer os battambang;
        }
        p,h3{
            text-align: center;
        }
        button{
            background-color: chartreuse;
        }
    </style>
</head>
<body>
    <div>
        <form>
            <fieldset>
                <h3>សូមស្វាគមន៏មកកាន់ប្រព័ន្ធ</h3>
                <label for="txtemail">អុីម៉ែលចូលប្រើប្រាស់</label><br>
                <input type="email" name="user email" id="txtemail" placeholder="example@gmail.com" required><br>
                <label for="txtpassword">លេខសម្ងាត់ចូលប្រើប្រាស់</label><br>
                <input type="password" name="user password" id="txtpassword" minlength="8" maxlength="12" required>
                <p>បន្តជាមួយ</p>
                <div>
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-google"></i>
                <i class="fa-brands fa-apple"></i><br>
                </div>
                <div>
                    <button type="submit">ចូលគណនី</button><br>
                </div><br>
                <div>
                    <a href="https://www.youtube.com/" target="_blank">ត្រូវការជំនួយ?</a>
            </fieldset>
                </div>
        </form>
    </div>
</body>
</html>
